<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login - Leaf & Lumen Books</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@300;500;700&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
    <style>
      .auth-container {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
      }
      .auth-box {
        background: var(--cream);
        padding: 40px;
        border-radius: var(--radius);
        box-shadow: 0 14px 34px var(--shadow);
        width: 100%;
        max-width: 400px;
      }
      .auth-box .tabs {
        margin-bottom: 24px;
      }
    </style>
  </head>
  <body>
    <div class="auth-container">
      <div class="auth-box">
        <div class="brand" style="margin-bottom: 32px; justify-content: center;">
          <div class="brand-mark">LL</div>
          <div>
            <div class="brand-title">Leaf & Lumen</div>
            <div class="brand-subtitle">Books curated for calm minds</div>
          </div>
        </div>

        <div class="tabs">
          <button class="tab is-active" data-tab="login">Login</button>
          <button class="tab" data-tab="register">Register</button>
        </div>

        <form class="form" id="login-form">
          <label>Email</label>
          <input type="email" id="login-email" placeholder="name@email.com" required />
          <label>Password</label>
          <input type="password" id="login-password" placeholder="••••••" required />
          
          <label>Role</label>
          <select id="login-role" style="width: 100%; padding: 12px; border: 1px solid #e1d3c1; border-radius: 8px; margin-bottom: 16px;">
            <option value="customer">Customer</option>
            <option value="admin">Admin</option>
          </select>

          <button class="primary" type="submit">Login</button>
        </form>

        <form class="form is-hidden" id="register-form">
          <label>Name</label>
          <input type="text" id="reg-name" placeholder="Your name" required />
          <label>Email</label>
          <input type="email" id="reg-email" placeholder="name@email.com" required />
          <label>Password</label>
          <input type="password" id="reg-password" placeholder="Create a password" required />
          
          <label>Role</label>
          <select id="reg-role" style="width: 100%; padding: 12px; border: 1px solid #e1d3c1; border-radius: 8px; margin-bottom: 16px;">
            <option value="customer">Customer</option>
            <option value="admin">Admin</option>
          </select>

          <div id="reg-adminkey-container" style="display: none;">
            <label>Admin Key</label>
            <input type="password" id="reg-adminkey" placeholder="Required for Admin" />
          </div>

          <button class="primary" type="submit">Create account</button>
        </form>
      </div>
    </div>

    <script src="login.js"></script>
  </body>
</html>
