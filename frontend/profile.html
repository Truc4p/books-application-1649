<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Profile - Leaf & Lumen Books</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@300;500;700&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
    <style>
      .profile-container {
        max-width: 600px;
        margin: 40px auto;
        background: var(--cream);
        padding: 40px;
        border-radius: var(--radius);
        box-shadow: 0 14px 34px var(--shadow);
      }
      .profile-header {
        margin-bottom: 24px;
        border-bottom: 1px solid #e1d3c1;
        padding-bottom: 16px;
      }
      .profile-details p {
        margin-bottom: 12px;
        font-size: 1.1rem;
      }
      .profile-details strong {
        display: inline-block;
        width: 80px;
        color: var(--muted);
      }
      .logout-btn {
        margin-top: 24px;
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark">LL</div>
          <div>
            <div class="brand-title">Leaf & Lumen</div>
            <div class="brand-subtitle">Books curated for calm minds</div>
          </div>
        </div>
        <nav class="topbar-nav" id="profile-nav">
          <!-- Populated by JS based on role -->
        </nav>
      </header>

      <main class="main">
        <div class="profile-container">
          <div class="profile-header">
            <h2>Your Account Profile</h2>
          </div>
          <div class="profile-details">
            <p><strong>Name:</strong> <span id="profile-name">-</span></p>
            <p><strong>Email:</strong> <span id="profile-email">-</span></p>
            <p><strong>Role:</strong> <span id="profile-role">-</span></p>
          </div>
          <button class="primary logout-btn" id="logout-btn">Log out</button>
        </div>
      </main>
    </div>

    <script src="profile.js"></script>
  </body>
</html>
